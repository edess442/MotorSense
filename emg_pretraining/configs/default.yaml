slurm:
  partition: scavenger
  account: scavenger
  qos: scavenger
  time: "24:00:00"
  mem: "120g"
  cpus_per_task: 4
  nodes: 8
  gpus_per_node: 8
  # gpu_type: "rtxa6000"
  # gpu_type: 'rtx2080ti'
  gpu_type: 'rtxa4000'
  port_range: [20000, 40000]
  log_dir: slurm_logs



tokenizers:
  left_hand:
    checkpoint_path: ./tokenizers/left_hand/vqvae_020.pt
    window_sec: 1.5
    fs: 500
    run_name: run0019_ed256_ne32_cps64_ews5_llw0.25
    codes_per_second: 64
    emg_window_size: 5
  right_hand:
    checkpoint_path: ./tokenizers/right_hand/vqvae_020.pt
    window_sec: 1.5
    fs: 500
    run_name: run0019_ed256_ne32_cps64_ews5_llw0.25
    codes_per_second: 64
    emg_window_size: 5
